<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Parisienne&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans JP',sans-serif;color:#4a4a47;background:#f1f0ea;line-height:1.9;font-size:15px;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  a{text-decoration:none;color:inherit}
  input,select{font-family:'Noto Sans JP',sans-serif}
</style>
</helmet>

<!-- HEADER -->
<header style="position:sticky;top:0;z-index:50;background:rgba(241,240,234,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,.07)">
  <div style="max-width:1240px;margin:0 auto;padding:0 32px;height:74px;display:flex;align-items:center;justify-content:space-between">
    <a href="index.html" style="display:flex;align-items:center;gap:11px">
      <svg viewBox="0 0 40 40" style="width:34px;height:34px;flex:none">
        <path d="M20 23 C21 30 24 33 29 35" fill="none" stroke="#8aae3e" stroke-width="2.2" stroke-linecap="round"></path>
        <circle cx="15" cy="15" r="8" fill="#7cb342"></circle><circle cx="25" cy="15" r="8" fill="#a4cf57"></circle><circle cx="15" cy="25" r="8" fill="#b2d566"></circle><circle cx="25" cy="25" r="8" fill="#6aa830"></circle>
      </svg>
      <span style="display:flex;flex-direction:column;line-height:1.15">
        <span style="font-family:'Noto Serif JP',serif;font-weight:700;font-size:20px;letter-spacing:.04em;color:#4a8a2c">メディスポット</span>
        <span style="font-size:10.5px;letter-spacing:.16em;color:#8a8a84">医療の出会いに、安心を。</span>
      </span>
    </a>
    <nav style="display:flex;align-items:center;gap:26px">
      <a href="index.html" style="font-size:13.5px;font-weight:500;color:#5a5a54;letter-spacing:.04em" style-hover="color:#4a8a2c">サービス紹介</a>
      <a href="register.html" style="font-size:13px;font-weight:600;color:#fff;background:#e0796b;border-radius:4px;padding:9px 17px;letter-spacing:.04em;box-shadow:0 4px 12px rgba(224,121,107,.28)" style-hover="background:#d06a5a">新規会員登録</a>
      <a href="login.html" style="font-size:13px;font-weight:600;color:#4a8a2c;border:1.5px solid #7cb342;border-radius:4px;padding:8px 16px;letter-spacing:.04em" style-hover="background:#7cb342;color:#fff">ログイン</a>
    </nav>
  </div>
</header>

<!-- PAGE HEADER -->
<section style="position:relative;background:linear-gradient(105deg,#6aa830 0%,#86bb44 55%,#aacd5e 100%);overflow:hidden;text-align:center;padding:54px 32px 50px">
  <div style="position:absolute;right:8%;top:50%;transform:translateY(-50%);width:240px;height:240px;border-radius:50%;background:radial-gradient(circle at 38% 35%,rgba(255,255,255,.3),rgba(255,255,255,0) 62%)"></div>
  <div style="position:relative">
    <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:rgba(255,255,255,.92)">Join Medispot</p>
    <h1 style="font-family:'Noto Serif JP',serif;font-weight:600;font-size:30px;color:#fff;letter-spacing:.08em;margin-top:2px">新規会員登録</h1>
    <p style="font-size:13px;color:rgba(255,255,255,.92);margin-top:8px">登録種別を選択して、必要事項を入力してください。</p>
  </div>
</section>

<!-- MAIN -->
<main style="flex:1;max-width:540px;width:100%;margin:46px auto 56px;padding:0 24px">

  <!-- ROLE SELECT -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px">
    <button type="button" onClick="{{ selectSeeker }}" style="{{ seekerCardStyle }}">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#36a3a8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6 6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"></path><path d="M8 15v1a6 6 0 0 0 6 6 6 6 0 0 0 6-6v-4"></path><circle cx="20" cy="10" r="2"></circle></svg>
      <span style="font-family:'Noto Serif JP',serif;font-weight:700;font-size:15px;color:#4a4a45">求職者として登録</span>
      <span style="font-size:11px;color:#8a8a82;line-height:1.55">医療資格者（看護師・検査技師・リハビリ職 など）</span>
    </button>
    <button type="button" onClick="{{ selectEmployer }}" style="{{ employerCardStyle }}">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#e0796b" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path><path d="M10 6h4"></path><path d="M10 10h4"></path><path d="M10 14h4"></path></svg>
      <span style="font-family:'Noto Serif JP',serif;font-weight:700;font-size:15px;color:#4a4a45">求人者として登録</span>
      <span style="font-size:11px;color:#8a8a82;line-height:1.55">医療機関（病院・クリニック・薬局 など）</span>
    </button>
  </div>

  <!-- FORM -->
  <form style="background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:34px 32px;box-shadow:0 6px 26px rgba(0,0,0,.05)" onsubmit="return false">

    <div style="margin-bottom:20px">
      <label style="display:block;font-size:13px;font-weight:600;color:#4a4a45;margin-bottom:8px">お名前（ご担当者名）<span style="color:#e0796b;font-size:10px;margin-left:6px;font-weight:700">必須</span></label>
      <input type="text" placeholder="例）佐藤 花子" style="width:100%;padding:12px 14px;border:1.5px solid #dcdbd2;border-radius:8px;font-size:14px;color:#4a4a47;background:#fbfbf8" style-focus="outline:none;border-color:#7cb342;box-shadow:0 0 0 3px rgba(124,179,66,.14)">
    </div>

    <!-- EMPLOYER ONLY -->
    <sc-if value="{{ isEmployer }}" hint-placeholder-val="{{ false }}">
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:600;color:#4a4a45;margin-bottom:8px">医療機関名<span style="color:#e0796b;font-size:10px;margin-left:6px;font-weight:700">必須</span></label>
        <input type="text" placeholder="例）ブランチ総合クリニック" style="width:100%;padding:12px 14px;border:1.5px solid #dcdbd2;border-radius:8px;font-size:14px;color:#4a4a47;background:#fbfbf8" style-focus="outline:none;border-color:#7cb342;box-shadow:0 0 0 3px rgba(124,179,66,.14)">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:600;color:#4a4a45;margin-bottom:8px">施設区分</label>
        <select style="width:100%;padding:12px 14px;border:1.5px solid #dcdbd2;border-radius:8px;font-size:14px;color:#4a4a47;background:#fbfbf8;appearance:none" style-focus="outline:none;border-color:#7cb342;box-shadow:0 0 0 3px rgba(124,179,66,.14)">
          <option>病院</option><option>クリニック（無床）</option><option>クリニック（有床）</option><option>調剤薬局</option><option>介護・福祉施設</option><option>健診センター</option><option>その他</option>
        </select>
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:600;color:#4a4a45;margin-bottom:8px">所在地</label>
        <input type="text" placeholder="例）東京都世田谷区〇〇1-2-3" style="width:100%;padding:12px 14px;border:1.5px solid #dcdbd2;border-radius:8px;font-size:14px;color:#4a4a47;background:#fbfbf8" style-focus="outline:none;border-color:#7cb342;box-shadow:0 0 0 3px rgba(124,179,66,.14)">
      </div>
    </sc-if>

    <!-- SEEKER ONLY -->
    <sc-if value="{{ isSeeker }}" hint-placeholder-val="{{ true }}">
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:600;color:#4a4a45;margin-bottom:8px">保有資格（職種）<span style="color:#e0796b;font-size:10px;margin-left:6px;font-weight:700">必須</span></label>
        <select style="width:100%;padding:12px 14px;border:1.5px solid #dcdbd2;border-radius:8px;font-size:14px;color:#4a4a47;background:#fbfbf8;appearance:none" style-focus="outline:none;border-color:#7cb342;box-shadow:0 0 0 3px rgba(124,179,66,.14)">
          <option>看護師</option><option>准看護師</option><option>保健師</option><option>助産師</option><option>臨床検査技師</option><option>診療放射線技師</option><option>理学療法士（PT）</option><option>作業療法士（OT）</option><option>言語聴覚士（ST）</option><option>薬剤師</option><option>介護福祉士・ヘルパー</option><option>その他</option>
        </select>
      </div>
    </sc-if>

    <div style="margin-bottom:20px">
      <label style="display:block;font-size:13px;font-weight:600;color:#4a4a45;margin-bottom:8px">メールアドレス<span style="color:#e0796b;font-size:10px;margin-left:6px;font-weight:700">必須</span></label>
      <input type="email" placeholder="例）example@example.com" style="width:100%;padding:12px 14px;border:1.5px solid #dcdbd2;border-radius:8px;font-size:14px;color:#4a4a47;background:#fbfbf8" style-focus="outline:none;border-color:#7cb342;box-shadow:0 0 0 3px rgba(124,179,66,.14)">
    </div>

    <div style="margin-bottom:24px">
      <label style="display:block;font-size:13px;font-weight:600;color:#4a4a45;margin-bottom:8px">パスワード<span style="color:#e0796b;font-size:10px;margin-left:6px;font-weight:700">必須</span></label>
      <input type="password" placeholder="8文字以上" style="width:100%;padding:12px 14px;border:1.5px solid #dcdbd2;border-radius:8px;font-size:14px;color:#4a4a47;background:#fbfbf8" style-focus="outline:none;border-color:#7cb342;box-shadow:0 0 0 3px rgba(124,179,66,.14)">
      <p style="font-size:11px;color:#a0a098;margin-top:8px;line-height:1.6">※ プロトタイプのため、実際のパスワードは使用しないでください。</p>
    </div>

    <button type="submit" style="{{ submitStyle }}">この内容で登録する</button>

    <p style="text-align:center;font-size:12.5px;color:#8a8a82;margin-top:18px">すでにアカウントをお持ちの方は <a href="login.html" style="color:#4a8a2c;font-weight:600" style-hover="text-decoration:underline">ログイン</a></p>
  </form>
</main>

<!-- FOOTER -->
<footer style="background:#fff;border-top:1px solid rgba(0,0,0,.06);padding:26px 32px;text-align:center">
  <p style="font-size:12px;color:#9a9a92">医療特化型 求人広告マッチングサービス</p>
  <p style="font-size:11px;color:#b0b0a8;margin-top:8px;letter-spacing:.06em">© 2026 Medispot Inc.</p>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { role: 'seeker' };

  componentDidMount() {
    const p = new URLSearchParams(location.search).get('role');
    if (p === 'employer' || p === 'seeker') this.setState({ role: p });
  }

  renderVals() {
    const role = this.state.role;
    const base = 'border-radius:12px;padding:22px 16px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;background:#fff;transition:all .18s;font-family:\'Noto Sans JP\',sans-serif;';
    const seekerSel = role === 'seeker';
    const empSel = role === 'employer';
    return {
      role,
      isSeeker: seekerSel,
      isEmployer: empSel,
      selectSeeker: () => this.setState({ role: 'seeker' }),
      selectEmployer: () => this.setState({ role: 'employer' }),
      seekerCardStyle: base + (seekerSel
        ? 'border:2px solid #36a3a8;background:#f1f9f9;box-shadow:0 6px 18px rgba(54,163,168,.15);'
        : 'border:2px solid #e2e0d7;'),
      employerCardStyle: base + (empSel
        ? 'border:2px solid #e0796b;background:#fdf3f0;box-shadow:0 6px 18px rgba(224,121,107,.15);'
        : 'border:2px solid #e2e0d7;'),
      submitStyle: 'width:100%;padding:14px;border:none;border-radius:9px;color:#fff;font-size:15px;font-weight:700;font-family:\'Noto Sans JP\',sans-serif;cursor:pointer;'
        + (empSel
          ? 'background:#e0796b;box-shadow:0 5px 14px rgba(224,121,107,.3);'
          : 'background:#36a3a8;box-shadow:0 5px 14px rgba(54,163,168,.3);'),
    };
  }
}
</script>
</body>
</html>
